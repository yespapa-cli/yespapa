name: Bug Report
description: Report a bug in YesPaPa
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `yespapa init`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: YesPaPa version
      description: Output of `yespapa --version`
      placeholder: "0.1.2"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (other)
        - Windows (WSL)
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - npm
        - npx
        - Homebrew
        - apt
        - From source

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output or logs.
      render: shell
